<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapp Planner - Organizador Mensual</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA & Mobile Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Planner">
    <link rel="apple-touch-icon" href="icon-512.png">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="calendar"></i>
                    <span>Aquapp<strong>Planner</strong></span>
                </div>
                <p class="subtitle">Organización de Muestras</p>
            </div>

            <div class="client-input-section">
                <div class="input-group">
                    <input type="text" id="new-client-name" placeholder="Nuevo cliente...">
                    <button id="add-client-btn" title="Añadir cliente">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <button id="open-import-btn" class="btn-text-small"
                    style="margin-top: 10px; width: 100%; text-align: left; padding: 4px 0;">
                    <i data-lucide="upload" style="width: 14px; height: 14px;"></i> Importar lista de clientes
                </button>
            </div>

            <div class="sidebar-lists-container" style="display: flex; flex-direction: column; flex: 1; overflow: hidden; margin-right: -10px; padding-right: 10px; gap: 16px;">
                <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                    <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 12px;">Clientes Pendientes</h3>
                    <div id="clients-list" class="clients-list" style="flex: 1; overflow-y: auto; padding-right: 4px;">
                        <!-- Client pills will appear here -->
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                    <h3 style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 12px; display:flex; align-items:center; gap:6px;">
                        <i data-lucide="users" style="width:14px; height:14px;"></i> Hechos por compañeros
                    </h3>
                    <div id="delegated-list" class="clients-list delegated-zone" style="flex: 1; overflow-y: auto; padding-right: 4px; border: 1px dashed var(--border); border-radius: 8px; background: rgba(0,0,0,0.02)">
                        <!-- Delegated pills will appear here -->
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="export-backup-btn" class="btn-secondary" style="margin-bottom: 8px;">
                    <i data-lucide="download"></i> Exportar Datos
                </button>
                <button id="import-backup-btn" class="btn-secondary" style="margin-bottom: 8px;">
                    <i data-lucide="upload-cloud"></i> Importar Datos
                </button>
                <button id="print-btn" class="btn-secondary">
                    <i data-lucide="printer"></i> Imprimir PDF
                </button>
                <input type="file" id="backup-file-input" accept=".json" style="display: none;">
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="calendar-header">
                <div class="month-navigation">
                    <button id="prev-month"><i data-lucide="chevron-left"></i></button>
                    <h2 id="current-month-year">Marzo 2026</h2>
                    <button id="next-month"><i data-lucide="chevron-right"></i></button>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-text" title="Cambiar Tema">
                        <i data-lucide="moon"></i>
                    </button>
                    <button id="clear-month" class="btn-text" title="Limpiar mes">
                        <i data-lucide="trash-2"></i>
                    </button>
                    <div id="save-indicator" class="save-indicator">
                        <i data-lucide="check-circle"></i> Guardado
                    </div>
                </div>
            </header>

            <div class="calendar-grid-container">
                <div class="calendar-grid-header">
                    <div>Lun</div>
                    <div>Mar</div>
                    <div>Mié</div>
                    <div>Jue</div>
                    <div>Vie</div>
                    <div>Sáb</div>
                    <div>Dom</div>
                </div>
                <div id="calendar-days" class="calendar-days">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Context Menu for Clients -->
    <div id="context-menu" class="context-menu" style="display: none;">
        <button id="delete-item"><i data-lucide="trash-2"></i> Eliminar</button>
    </div>

    <!-- Bulk Import Modal -->
    <div id="import-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i data-lucide="upload"></i> Importar Clientes</h3>
                <button id="close-import-modal" class="btn-text"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <p>Pega aquí tu lista de clientes (uno por línea):</p>
                <textarea id="import-textarea" placeholder="Cliente 1&#10;Cliente 2&#10;Cliente 3..."></textarea>
            </div>
            <div class="modal-footer">
                <button id="confirm-import-btn" class="btn-primary">Añadir Clientes</button>
            </div>
        </div>
    </div>

    <!-- Mobile Navigation FAB -->
    <button id="mobile-sidebar-toggle" class="mobile-fab">
        <i data-lucide="users"></i>
    </button>

    <!-- Touch Drag and Drop Polyfill -->
    <script src="https://unpkg.com/mobile-drag-drop@latest/index.min.js"></script>
    <script src="https://unpkg.com/mobile-drag-drop@latest/scroll-behaviour.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/mobile-drag-drop@latest/default.css">
    <script>
        // Requisito para iOS Safari
        window.addEventListener('touchmove', function () {}, {passive: false});
        
        MobileDragDrop.polyfill({
            dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride,
            holdToDrag: 250 // Requiere mantener pulsado 250ms para arrastrar. ¡Esto arregla el scroll!
        });
    </script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="main.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registrado!', reg))
                    .catch(err => console.error('Error al registrar Service Worker', err));
            });
        }
    </script>
</body>

</html>
